<script>
    // --- לוגיקה בסיסית ---
    function toggleChat() {
        const chat = document.getElementById('chat-window');
        if (chat.style.display === 'none') {
            chat.style.display = 'flex';
            if (document.getElementById('chat-messages').children.length === 0) {
                startFlow();
            }
        } else {
            chat.style.display = 'none';
        }
    }

    function addMessage(html) {
        const container = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerHTML = html;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    async function showTyping(ms = 800) {
        // כאן ניתן להוסיף אנימציית "מקליד..."
        return new Promise(res => setTimeout(res, ms));
    }

    // --- הפונקציות המשופרות שלך (הכנס לכאן את כל הפונקציות ששיפרנו) ---
    async function startFlow() {
        await showTyping(500);
        addMessage("<b>היי, אני גל!</b> 👋<br>העוזר האישי של יקיר כהן. מה אנחנו יוצרים היום?");
        addMessage(`
            <div class="options-grid">
                <button class="opt-btn" onclick="flowRecording()">🎙️ הקלטת שיר / ברכה</button>
                <button class="opt-btn" onclick="flowFamily()">👨‍👩‍👧‍👦 שיר וקליפ משפחתי</button>
                <button class="opt-btn" onclick="flowPodcast()">🎙️ סטודיו לפודקאסטים</button>
                <button class="opt-btn" onclick="flowEvents()">✨ אטרקציות ואירועים</button>
                <button class="opt-btn" onclick="flowMobile()">🚐 האולפן הנייד (VIP)</button>
                <button class="opt-btn" onclick="flowAcademy()">🎓 האקדמיה של יקיר</button>
                <button class="opt-btn" onclick="flowContact()">📞 צור קשר ישיר</button>
            </div>
        `);
    }

window.playDemo = function(type) {
    const dry = document.getElementById('demo-dry');
    const wet = document.getElementById('demo-wet');
    
    // עצירת כל האודיו לפני הפעלה מחדש
    if (dry) { dry.pause(); dry.currentTime = 0; }
    if (wet) { wet.pause(); wet.currentTime = 0; }
    
    if(type === 'dry' && dry) dry.play();
    if(type === 'wet' && wet) wet.play();
};
