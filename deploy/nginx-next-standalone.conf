server {
    listen 80;
    listen [::]:80;
    server_name TEMPORARY_DEPLOYMENT_HOST www.yakircohen.com yakircohen.com;

    root /var/www/yakir-cohen-productions;

    client_max_body_size 50m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location ^~ /_next/static/ {
        alias /var/www/yakir-cohen-productions/.next/static/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ^~ /assets/ {
        alias /var/www/yakir-cohen-productions/public/assets/;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /icon.svg {
        alias /var/www/yakir-cohen-productions/public/icon.svg;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
