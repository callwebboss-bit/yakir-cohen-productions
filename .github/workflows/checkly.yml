name: Checkly — E2E & API Monitoring

on:
  deployment_status:          # runs when Vercel marks the deploy as "success"

jobs:
  run-checks:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CHECKLY_API_KEY:     ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID:  ${{ secrets.CHECKLY_ACCOUNT_ID }}
      PRODUCTION_URL:      ${{ github.event.deployment_status.target_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Checkly CLI
        run: pnpm add -D checkly

      - name: Run checks against deployed URL
        if: env.CHECKLY_API_KEY != '' && env.CHECKLY_ACCOUNT_ID != ''
        run: npx checkly test --record --verbose
        # --record  → saves results to Checkly dashboard
        # --verbose → full output in CI logs

      - name: Deploy check definitions
        if: github.ref == 'refs/heads/main' && env.CHECKLY_API_KEY != '' && env.CHECKLY_ACCOUNT_ID != ''
        run: npx checkly deploy --force
        # Syncs check definitions to Checkly on every main push
